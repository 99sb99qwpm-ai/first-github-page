<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Page</title>
    <style>
        /* CSS: Styling the page */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #2980b9;
        }
        #message {
            margin-top: 20px;
            font-weight: bold;
            color: #27ae60;
            min-height: 24px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello, World!</h1>
        <p>Welcome to my simple GitHub Pages website.</p>
        <button id="clickMeBtn">Click Me!</button>
        <div id="message"></div>
    </div>

    <script>
    const button = document.getElementById('clickMeBtn');
    const messageDiv = document.getElementById('message');

    // 1. Define the API URL you want to connect to
    const API_URL = 'https://catfact.ninja/fact'; 

    button.addEventListener('click', () => {
        messageDiv.textContent = "Loading fact...";

        // 2. Use fetch() to connect to the backend
        fetch(API_URL)
            .then(response => {
                // Check if the backend responded successfully
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.json(); // Convert the response to JSON
            })
            .then(data => {
                // 3. Use the data from the backend to update your HTML
                // (catfact.ninja returns an object like { fact: "..." })
                messageDiv.textContent = data.fact; 
            })
            .catch(error => {
                // Handle any errors (backend down, internet issue, etc.)
                console.error('Error:', error);
                messageDiv.textContent = "Failed to fetch data from backend. ❌";
            });
    })
    </script>
</body>
</html>
